<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Tabela Consultório do iPhone</title>

  <style>
    :root{
      --bg:#f5f5f7;
      --card: rgba(255,255,255,.86);
      --stroke: rgba(0,0,0,.08);
      --text:#1d1d1f;
      --muted: rgba(29,29,31,.65);
      --radius:18px;

      --blue:#0a84ff;
      --purple:#5856d6;
      --green:#34c759;
      --gold:#b8891f;

      --btnBg: rgba(10,132,255,.10);
      --btnStroke: rgba(10,132,255,.25);

      --black:#0b0b0f;
      --manga:#0b3d1a;
      --tech:#0a84ff;
      --quality:#b8891f;
      --sena:#ff6a00;
      --br10:#b42318;
      --upgrade:#6d28d9;

      --techDark:#061b3a;
      --mangaDark:#0b0b0f;
      --qualityDark:#2a1f05;
      --senaDark:#3a1800;
      --br10Dark:#3f0f12;
      --upgradeDark:#24103f;
    }

    *{box-sizing:border-box; min-width:0;}
    html, body { width:100%; max-width:100%; overflow-x:hidden; }

    body{
      margin:0;
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(10,132,255,.12), transparent 60%),
        radial-gradient(1200px 600px at 80% 0%, rgba(88,86,214,.14), transparent 55%),
        var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    header{
      position:sticky;top:0;z-index:50;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(245,245,247,.78);
      border-bottom:1px solid var(--stroke);
    }
    .header-inner{
      max-width:1100px;margin:0 auto;
      padding:14px 14px;
      display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
      flex-wrap: wrap;
    }
    .title{display:flex;flex-direction:column;gap:4px}
    .title h1{
      margin:0;font-size:18px;letter-spacing:-.2px;line-height:1.1;
      background: linear-gradient(90deg,var(--blue),var(--purple));
      -webkit-background-clip:text;background-clip:text;color:transparent;
    }
    .title small{color:var(--muted);font-size:12px;overflow-wrap:anywhere}

    .head-actions{
      display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end;
      max-width:100%;
    }

    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:10px 12px;border-radius:999px;
      background: rgba(255,255,255,.84);
      border:1px solid var(--stroke);
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
      font-size:12px;color:var(--muted);
      max-width:100%;
      white-space: normal;
    }

    .toggleAll{
      appearance:none;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.84);
      color: rgba(29,29,31,.78);
      font-weight:900;
      font-size:12px;
      padding:10px 12px;
      border-radius:999px;
      cursor:pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
      transition: transform .08s ease, background .2s ease;
      white-space:nowrap;
    }
    .toggleAll:active{transform:scale(.98)}
    .toggleAll:hover{background: rgba(255,255,255,.92)}

    .wrap{max-width:1100px;margin:0 auto;padding:18px 14px 42px;width:100%;}

    .filters{
      margin-bottom:16px;
      border:1px solid var(--stroke);
      border-radius:22px;
      background: rgba(255,255,255,.72);
      box-shadow: 0 10px 28px rgba(0,0,0,.06);
      overflow:hidden;
    }
    .filters-head{
      padding:14px 14px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      border-bottom:1px solid var(--stroke);
      background: rgba(255,255,255,.55);
    }
    .filters-head h2{
      margin:0;
      font-size:15px;
      letter-spacing:-.2px;
    }
    .filters-head .pill{
      box-shadow:none;
      background: rgba(245,245,247,.95);
    }
    .filters-grid{
      padding:14px;
      display:grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap:10px;
    }
    .filter-field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .filter-field.wide{
      grid-column: span 2;
    }
    .filter-field label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }
    .filter-field input,
    .filter-field select{
      width:100%;
      appearance:none;
      border:1px solid var(--stroke);
      background:#fff;
      color:var(--text);
      font-size:14px;
      padding:12px 13px;
      border-radius:14px;
      outline:none;
      box-shadow: 0 4px 14px rgba(0,0,0,.04);
    }
    .filter-actions{
      padding:0 14px 14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }
    .filter-buttons{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .btn-clean{
      appearance:none;
      border:1px solid var(--stroke);
      background:#fff;
      color:var(--text);
      font-weight:800;
      font-size:13px;
      padding:11px 14px;
      border-radius:12px;
      cursor:pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,.05);
    }
    .btn-clean:hover{background:#fafafa}
    .filters-note{
      font-size:12px;
      color:var(--muted);
    }

    .block{
      border:1px solid var(--stroke);
      border-radius: 22px;
      background: rgba(255,255,255,.55);
      box-shadow: 0 10px 28px rgba(0,0,0,.06);
      overflow:hidden;
      margin: 14px 0;
      width:100%;
      max-width:100%;
    }

    .block-head{
      padding:14px 14px;
      display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
      border-bottom:1px solid rgba(255,255,255,.10);
      background: var(--black);
      color: #fff;
      flex-wrap: wrap;
      text-align:center;
    }

    .block-left{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      min-width: 0;
      flex: 1;
      justify-content: center;
    }

    .store-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 10px 12px;
      border-radius: 999px;
      font-weight: 850;
      letter-spacing: -.2px;
      font-size: 13px;
      color: #fff;
      border: 1px solid rgba(255,255,255,.14);
      white-space:nowrap;
    }
    .store-badge.upgrade{ background: var(--upgrade); }
    .store-badge.manga{ background: var(--manga); }
    .store-badge.tech{ background: var(--tech); }
    .store-badge.quality{ background: var(--quality); color:#fff; }
    .store-badge.sena{ background: var(--sena); color:#fff; }
    .store-badge.br10{ background: var(--br10); color:#fff; }

    .block-sub{
      font-size:12px;
      color: rgba(255,255,255,.75);
      padding: 6px 10px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      max-width: 100%;
      white-space: normal;
    }
    .block-sub-stack{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
      text-align:center;
    }

    .section{padding: 2px 12px 14px;}
    .section-head{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      margin: 14px 2px 10px;
      flex-wrap:wrap;
      position: relative;
      justify-content: center;
    }
    .section-head h3{
      margin:0;
      font-size:15px;
      letter-spacing:-.2px;
      padding:6px 14px;
      border-radius:999px;
      color:#fff;
      text-align:center;
    }
    .section-head .count{
      position:absolute;
      right:0;
    }
    .h3-blue{background: var(--black)}
    .h3-green{background: var(--green)}
    .h3-upgrade{background: var(--purple)}
    .count{
      color:var(--muted);font-size:12px;
      padding:6px 10px;border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.65);
      white-space:nowrap;
    }

    details.cat{
      border:1px solid var(--stroke);
      border-radius: var(--radius);
      background: rgba(255,255,255,.55);
      overflow:hidden;
      margin-bottom: 10px;
      width:100%;
      max-width:100%;
    }
    details.cat > summary{
      list-style:none;cursor:pointer;
      padding: 12px 12px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      flex-wrap:wrap;
    }
    details.cat > summary::-webkit-details-marker{display:none}
    .cat-left{display:flex;flex-direction:column;gap:2px;min-width:0}
    .cat-title{margin:0;font-size:13px;font-weight:760;letter-spacing:-.2px;overflow-wrap:anywhere}
    .cat-sub{font-size:12px;color:var(--muted)}

    details.line{
      border:1px solid rgba(0,0,0,.06);
      border-radius: 14px;
      background: rgba(255,255,255,.48);
      margin: 10px 10px 12px;
      overflow:hidden;
    }
    details.line > summary{
      list-style:none;cursor:pointer;
      padding: 10px 10px;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    details.line > summary::-webkit-details-marker{display:none}
    .line-title{
      font-size:12px;color:var(--muted);
      letter-spacing:.2px;text-transform:uppercase;
      margin:0;
    }
    .line-hint{
      font-size:12px;color:var(--muted);
      padding:6px 10px;border-radius:999px;
      border:1px solid rgba(0,0,0,.06);
      background: rgba(255,255,255,.65);
      white-space:nowrap;
    }

    .line-block{padding:0 10px 10px; width:100%; max-width:100%;}

    .grid{
      display:grid;
      gap:10px;
      width:100%;
      max-width:100%;
      min-width:0;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    @media (max-width:700px){
      .filters-grid{
        grid-template-columns: repeat(2, minmax(0,1fr));
      }
      .filter-field.wide{
        grid-column: span 2;
      }
    }
    @media (max-width:360px){
      .grid{ grid-template-columns: 1fr; }
      .filters-grid{ grid-template-columns: 1fr; }
      .filter-field.wide{ grid-column: span 1; }
    }

    .card{
      background: var(--card);
      border:1px solid var(--stroke);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,.06);
      display:flex;flex-direction:column;gap:10px;
      min-height: 168px;
      width:100%;
      max-width:100%;
      min-width:0;
    }

    .card.iphone.upgrade{
      background: var(--upgradeDark);
      border-color: rgba(255,255,255,.14);
      color:#fff;
    }
    .card.iphone.manga{
      background: var(--mangaDark);
      border-color: rgba(255,255,255,.14);
      color:#fff;
    }
    .card.iphone.tech{
      background: var(--tech);
      border-color: rgba(255,255,255,.14);
      color:#fff;
    }
    .card.quality{
      background: var(--qualityDark);
      border-color: rgba(255,255,255,.14);
      color:#fff;
    }
    .card.iphone.sena{
      background: var(--senaDark);
      border-color: rgba(255,255,255,.14);
      color:#fff;
    }
    .card.iphone.br10{
      background: var(--br10Dark);
      border-color: rgba(255,255,255,.14);
      color:#fff;
    }

    .card.store-upgrade.status-seminovo,
    .card.store-tech.status-seminovo,
    .card.store-quality.status-seminovo,
    .card.store-sena.status-seminovo,
    .card.store-br10.status-seminovo{
      color:#fff;
    }

    .card.iphone.upgrade .details,
    .card.iphone.manga .details,
    .card.iphone.tech .details,
    .card.quality .details,
    .card.iphone.sena .details,
    .card.iphone.br10 .details{
      color: rgba(255,255,255,.72);
    }
    .card.iphone.upgrade .chip,
    .card.iphone.manga .chip,
    .card.iphone.tech .chip,
    .card.quality .chip,
    .card.iphone.sena .chip,
    .card.iphone.br10 .chip{
      background: rgba(255,255,255,.10);
      border-color: rgba(255,255,255,.16);
      color: rgba(255,255,255,.85);
    }
    .card.iphone.upgrade .installment,
    .card.iphone.manga .installment,
    .card.iphone.tech .installment,
    .card.quality .installment,
    .card.iphone.sena .installment,
    .card.iphone.br10 .installment{
      color: rgba(255,255,255,.78);
    }
    .card.iphone.upgrade .copy,
    .card.iphone.manga .copy,
    .card.iphone.tech .copy,
    .card.quality .copy,
    .card.iphone.sena .copy,
    .card.iphone.br10 .copy{
      border-color: rgba(255,255,255,.18);
      background: rgba(255,255,255,.10);
      color: rgba(255,255,255,.92);
    }
    .card.iphone.upgrade .copy:hover,
    .card.iphone.manga .copy:hover,
    .card.iphone.tech .copy:hover,
    .card.quality .copy:hover,
    .card.iphone.sena .copy:hover,
    .card.iphone.br10 .copy:hover{
      background: rgba(255,255,255,.14);
    }

    .badge{
      align-self:flex-start;
      font-size:11px;
      padding:6px 9px;border-radius:999px;
      border:1px solid rgba(0,0,0,.06);
      background: rgba(0,0,0,.04);
      color: rgba(29,29,31,.72);
      white-space:nowrap;
    }
    .badge.lacrado{
      background: rgba(10,132,255,.10);
      border-color: rgba(10,132,255,.22);
      color: rgba(10,132,255,.95);
    }
    .badge.seminovo{
      background: rgba(52,199,89,.12);
      border-color: rgba(52,199,89,.22);
      color: rgba(52,199,89,.95);
    }
    .badge.upgrade{
      background:#0b6b2b;
      border-color: rgba(255,255,255,.18);
      color:#fff;
    }

    .card.quality .badge,
    .card.quality .badge.lacrado,
    .card.quality .badge.seminovo{
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.18);
      color:#fff;
    }

    .image-wrap{
      width:100%;
      aspect-ratio: 16 / 10;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(0,0,0,.06);
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.9), rgba(245,245,247,.8) 30%, rgba(230,230,235,.9) 100%);
      position:relative;
    }
    .card.iphone.upgrade .image-wrap,
    .card.iphone.manga .image-wrap,
    .card.iphone.tech .image-wrap,
    .card.quality .image-wrap,
    .card.iphone.sena .image-wrap,
    .card.iphone.br10 .image-wrap{
      border-color: rgba(255,255,255,.12);
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.18), rgba(255,255,255,.08) 30%, rgba(255,255,255,.04) 100%);
    }
    .product-image{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#fff;
    }
    .image-fallback{
      position:absolute; inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:6px;
      padding:12px;
      text-align:center;
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }
    .card.iphone.upgrade .image-fallback,
    .card.iphone.manga .image-fallback,
    .card.iphone.tech .image-fallback,
    .card.quality .image-fallback,
    .card.iphone.sena .image-fallback,
    .card.iphone.br10 .image-fallback{
      color: rgba(255,255,255,.78);
    }
    .image-label{
      position:absolute;
      left:10px;
      right:10px;
      bottom:10px;
      padding:6px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      text-align:center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      background: rgba(255,255,255,.78);
      color: var(--text);
      border:1px solid rgba(0,0,0,.06);
    }
    .card.iphone.upgrade .image-label,
    .card.iphone.manga .image-label,
    .card.iphone.tech .image-label,
    .card.quality .image-label,
    .card.iphone.sena .image-label,
    .card.iphone.br10 .image-label{
      background: rgba(0,0,0,.34);
      color:#fff;
      border-color: rgba(255,255,255,.16);
    }

    .name{
      margin:0;font-size:13px;font-weight:900;letter-spacing:-.15px;line-height:1.2;
      overflow-wrap:anywhere; word-break: break-word;
    }
    .details{
      margin:0;font-size:12px;color:var(--muted);line-height:1.25;min-height:15px;
      overflow-wrap:anywhere; word-break: break-word;
    }

    .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:-2px;min-width:0}
    .chip{
      font-size:11px;
      padding:5px 8px;border-radius:999px;
      background: rgba(0,0,0,.035);
      border:1px solid rgba(0,0,0,.06);
      color: rgba(29,29,31,.72);
      max-width: 100%;
      overflow-wrap:anywhere;
    }

    .price-row{
      margin-top:auto;
      display:flex;align-items:flex-end;justify-content:space-between;gap:10px;
      min-width:0;
      flex-wrap: wrap;
    }

    .price{
      font-weight:900;letter-spacing:-.2px;font-size:14px;
      white-space: normal;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:baseline;
    }
    .installment{
      font-weight:800;
      font-size:12px;
      color: rgba(29,29,31,.70);
      white-space:nowrap;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .copy{
      appearance:none;
      border:1px solid var(--btnStroke);
      background: var(--btnBg);
      color: rgba(10,132,255,.95);
      font-weight:900;
      font-size:12px;
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      transition: transform .08s ease, background .2s ease;
      white-space:nowrap;
    }
    .copy:hover{background: rgba(10,132,255,.14)}
    .copy:active{transform:scale(.98)}

    .foot{
      color:var(--muted);
      font-size:12px;
      text-align:center;
      padding: 14px 0 8px;
    }

    .empty-state{
      display:none;
      margin:18px 0;
      border:1px dashed var(--stroke);
      border-radius:20px;
      background: rgba(255,255,255,.7);
      padding:26px 18px;
      text-align:center;
      color:var(--muted);
      box-shadow: 0 10px 28px rgba(0,0,0,.04);
    }
    .empty-state.show{display:block}

    .toast{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(29,29,31,.92);
      color:#fff;
      font-size:12px;
      padding: 10px 12px;
      border-radius:999px;
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
      opacity:0;
      pointer-events:none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 1000;
    }
    .toast.show{opacity:1; transform: translateX(-50%) translateY(-6px);}
  </style>
</head>

<body>
<header>
  <div class="header-inner">
    <div class="title">
      <h1>Tabela Consultório do iPhone</h1>
      <small>Valores à vista. Parcelado em até 18x: consultar.</small>
    </div>

    <div class="head-actions">
      <button class="toggleAll" id="toggleAllBtn" type="button">🔽 Abrir todas</button>
      <div class="pill" id="updatedPill">📌 Atualização: hoje</div>
    </div>
  </div>
</header>

<div class="wrap">
  <section class="filters">
    <div class="filters-head">
      <h2>Filtros de pesquisa</h2>
      <div class="pill" id="resultsPill">Mostrando todos</div>
    </div>

    <div class="filters-grid">
      <div class="filter-field wide">
        <label for="filterSearch">Pesquisa</label>
        <input id="filterSearch" type="text" placeholder="Buscar por modelo, cor, loja, linha..." />
      </div>

      <div class="filter-field">
        <label for="filterModel">Modelo</label>
        <select id="filterModel">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="filter-field">
        <label for="filterCapacity">Gigas</label>
        <select id="filterCapacity">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="filter-field">
        <label for="filterColor">Cores</label>
        <select id="filterColor">
          <option value="">Todas</option>
        </select>
      </div>

      <div class="filter-field">
        <label for="filterStatus">Estado</label>
        <select id="filterStatus">
          <option value="">Todos</option>
          <option value="LACRADOS">Lacrados</option>
          <option value="SEMINOVOS">Seminovos</option>
          <option value="UPGRADE">Upgrade</option>
        </select>
      </div>

      <div class="filter-field">
        <label for="filterMin">Valor mínimo</label>
        <input id="filterMin" type="text" inputmode="numeric" placeholder="Ex: 3000" />
      </div>

      <div class="filter-field">
        <label for="filterMax">Valor máximo</label>
        <input id="filterMax" type="text" inputmode="numeric" placeholder="Ex: 5000" />
      </div>
    </div>

    <div class="filter-actions">
      <div class="filter-buttons">

function parseBRL(brl){
  if (!brl) return NaN;
  const s = String(brl)
    .replace(/[^\d.,-]/g, "")
    .replace(/\./g, "")
    .replace(",", ".");
  const n = Number(s);
  return Number.isFinite(n) ? n : NaN;
}
function formatBRL(n){
  if (!Number.isFinite(n)) return "";
  return n.toLocaleString("pt-BR", { style:"currency", currency:"BRL" });
}
function calcInstallmentFromCash(cashValue, n){
  const fee = CARD_FEES.credit?.[n];
  if (!Number.isFinite(cashValue) || !fee) return null;
  const total = cashValue / (1 - fee);
  const parcela = total / n;
  return { parcela: Number(parcela.toFixed(2)) };
}

function normalizeMoneyText(text){
  const value = parseBRL(text);
  return Number.isFinite(value) ? formatBRL(value) : "";
}

const DEFAULT_STATUS = "LACRADOS";

const EMOJI_COLOR_MAP = new Map([
  ["🖤","preto"], ["🤍","branco"], ["💙","azul"], ["🩶","cinza"],
  ["🩷","rosa"], ["💜","roxo"], ["🩵","azul claro"], ["❤️","vermelho"],
  ["🧡","dourado"], ["💛","amarelo"], ["💚","verde"],
]);

function normalizeLine(s){ return (s || "").replace(/\r/g, "").trim(); }

function cleanHeaderText(line){
  return String(line || "")
    .replace(/[📦📱📲💎⌚⌚️🎧✅❗🚨💰💵_]/g, "")
    .replace(/\s+/g, " ")
    .trim()
    .toUpperCase();
}

function isStatusHeader(line){
  const t = cleanHeaderText(line);
  if (!t) return false;

  if (t.includes("SEMINOVO")) return true;
  if (t.includes("LACRADO")) return true;
  if (t === "LACRADOS" || t === "SEMINOVOS" || t === "UPGRADE" || t === "UPGRADES") return true;

  return false;
}

function detectStatus(line){
  if (!isStatusHeader(line)) return null;
  const t = cleanHeaderText(line);
  if (t.includes("SEMINOVO")) return "SEMINOVOS";
  if (t.includes("UPGRADE")) return "UPGRADE";
  if (t.includes("LACRADO")) return "LACRADOS";
  return null;
}

function isCategoryLine(line){ return /^\*\*.+\*\*$/.test(line.trim()); }
function parseCategory(line){ return line.trim().replace(/^\*\*|\*\*$/g, "").trim(); }

function guessCategoryFromText(line){
  const t = line.toUpperCase();
  if (t.includes("IPAD")) return "iPads";
  if (t.includes("RELÓG") || t.includes("RELOG")) return "Relógios";
  if (t.includes("WATCH")) return "Apple Watch";
  if (t.includes("MACBOOK") || t.includes("MAC ")) return "MacBooks";
  if (t.includes("AIRPODS")) return "AirPods";
  if (t.includes("IPHONE") || /^\d/.test(t) || t.includes("LINHA 17")) return "iPhone";
  return null;
}

function isItemStart(line){
  return /^(📍|📲|📱|💎|💻|⌚|⌚️|🎧)\s*/.test(line);
}

function parseItemLine(line){
  const raw = line.replace(/^(📍|📲|📱|💎|💻|⌚|⌚️|🎧)\s*/, "").trim();
  const priceMatch = raw.match(/[💰💵]?\s*R\$\s*[\d.]+(?:,\d{2})?/i);
  const price = priceMatch ? priceMatch[0].replace(/[💰💵]/g, "").trim() : "";
  const name = priceMatch ? raw.replace(priceMatch[0], "").replace(/\*+/g, "").trim() : raw;

  const parts = name.split(" • ").map(x => x.trim()).filter(Boolean);
  const title = parts[0] || name;
  const details = parts.slice(1).join(" • ");

  return { title, details, price, raw: name };
}

function capitalizeBrand(s){
  return (s || "")
    .replace(/\bIPHONE\b/ig, "iPhone")
    .replace(/\bIPAD\b/ig, "iPad")
    .replace(/\bAPPLE\b/ig, "Apple")
    .replace(/\bAPLLE\b/ig, "Apple")
    .replace(/\bMACBOOK\b/ig, "MacBook")
    .replace(/\bAIRPODS\b/ig, "AirPods")
    .replace(/\s+/g, " ")
    .trim();
}

function extractColorsFromWords(text){
  const t = (text || "").toLowerCase();
  const COLORS = [
    "preto","branco","azul","rosa","verde","vermelho","amarelo","roxo","cinza","grafite",
    "prata","laranja","bege","dourado","lilas","lilás","natural","desert",
    "silver","midnight","starlight","gold","graphite","space gray","spacegrey","space",
    "black","estelar","light blue","ocean band","milanes","milanese","lavanda","rose gold"
  ];

  const normalized = t.replace(/\s+/g, " ").trim();
  const hits = [];
  for (const c of COLORS){
    const needle = c.toLowerCase();
    if (needle.includes(" ")){
      if (normalized.includes(needle) && !hits.includes(c)) hits.push(c);
    }else{
      const re = new RegExp(`\\b${needle}\\b`, "i");
      if (re.test(normalized) && !hits.includes(c)) hits.push(c);
    }
  }

  normalized.split(/\/|,| e /i).map(s => s.trim()).forEach(p => {
    if (COLORS.includes(p) && !hits.includes(p)) hits.push(p);
  });

  return hits;
}

function extractColorsFromEmojiLine(line){
  const chars = Array.from((line || "").trim());
  const out = [];
  for (const ch of chars){
    if (EMOJI_COLOR_MAP.has(ch) && !out.includes(ch)) out.push(ch);
  }
  return out;
}

function colorsTextForMessage(item){
  const parts = [];
  if (item.colorsWords && item.colorsWords.length) parts.push(item.colorsWords.join(" / "));
  if (item.colorsEmoji && item.colorsEmoji.length){
    const names = item.colorsEmoji.map(e => EMOJI_COLOR_MAP.get(e)).filter(Boolean);
    if (names.length) parts.push(names.join(" / "));
  }
  const merged = parts.join(" / ").split(" / ").map(s => s.trim()).filter(Boolean);
  const unique = [];
  for (const m of merged){
    const normalized = m.toLowerCase();
    if (!unique.some(x => x.toLowerCase() === normalized)) unique.push(m);
  }
  return unique.join(" / ");
}

function extractCapacity(text){
  const s = (text || "");
  const m = s.match(/\b(40|42|44|46|49|64|128|256|512)\s*(gb|g|mm)\b|\b1\s*tb\b|\b2\s*tb\b|\b1\s*tera\b|\b1\s*t\b/i);
  if (!m) return "";
  return m[0]
    .toUpperCase()
    .replace(/\s+/g, "")
    .replace(/\b1TERA\b/i, "1TB")
    .replace(/\b1T\b/i, "1TB")
    .replace(/G$/, "GB");
}

function cleanModelOnly(text){
  let s = (text || "")
    .replace(/\(.*?\)/g, " ")
    .replace(/\bgrade\s*[a-z]+\b/ig, " ")
    .replace(/\bUPGRADE\b/ig, " ")
    .replace(/\bGARANTIA\b/ig, " ")
    .replace(/\bBATERIA\b/ig, " ")
    .replace(/\bCPO\b/ig, " ")
    .replace(/\bM[EÊ]S\b/ig, " ")
    .replace(/\bNOTA\s*FISCAL\b/ig, " ")
    .replace(/\bESIM\+CHIP\s*F[ÍI]SICO\b/ig, " ")
    .replace(/\bESIM\b/ig, " ")
    .replace(/\bCHIP\s*F[ÍI]SICO\b/ig, " ")
    .replace(/\bIMPORTADO\b/ig, " ")
    .replace(/\bNACIONAL\b/ig, " ")
    .replace(/\bCAIXA\s*NORMAL\b/ig, " ")
    .replace(/\bANATEL\b/ig, " ")
    .replace(/\bNF\b/ig, " ")
    .replace(/\bWIFI\b/ig, " ")
    .replace(/\bGPS\b/ig, " ")
    .replace(/\bCELULAR\b/ig, " ")
    .replace(/\bHA\b/ig, " ")
    .replace(/\bAB\b/ig, " ")
    .replace(/\bLACRADO\b/ig, " ")
    .replace(/[–—]/g, "-")
    .replace(/🇺🇸|🇯🇵/g, " ")
    .replace(/\s+/g, " ")
    .trim();

  const cap = extractCapacity(s);
  if (cap){
    const idx = s.toUpperCase().indexOf(cap);
    if (idx > 0) s = s.slice(0, idx).trim();
  }

  const up = s.toUpperCase();
  if (!up.includes("IPHONE") && (/^\d{2}/.test(s) || up.startsWith("11") || up.startsWith("12") || up.startsWith("13") || up.startsWith("14") || up.startsWith("15") || up.startsWith("16") || up.startsWith("17"))){
    s = `iPhone ${s}`.replace(/\s+/g, " ").trim();
  }

  s = capitalizeBrand(s);
  s = s.replace(/\bPRO\s+MAX\b/ig, "Pro Max")
       .replace(/\bPRO\b/ig, "Pro")
       .replace(/\bPLUS\b/ig, "Plus")
       .replace(/\bMINI\b/ig, "mini")
       .replace(/\bAIR\b/ig, "Air")
       .replace(/\bULTRA\b/ig, "Ultra")
       .replace(/\bMAX\b/ig, "Max")
       .replace(/\bSERIES\b/ig, "Series")
       .replace(/\bSE\b/ig, "SE");

  return s;
}

function displayTitle(item){
  const model = cleanModelOnly(item.title || item.raw);
  const cap = extractCapacity(item.title || item.raw);
  const colors = colorsTextForMessage(item);

  const left = [model, cap].filter(Boolean).join(" • ");
  return colors ? `${left} • ${colors}` : left;
}

function modelForMessage(item){
  const model = cleanModelOnly(item.title || item.raw);
  const cap = extractCapacity(item.title || item.raw);
  return cap ? `${model} – ${cap}` : model;
}

function modelFilterValue(item){
  return cleanModelOnly(item.title || item.raw);
}

function imageModelKey(item){
  const model = cleanModelOnly(item.title || item.raw);
  const orderedKeys = Object.keys(MODEL_IMAGES).sort((a, b) => b.length - a.length);
  const found = orderedKeys.find(key => model.toLowerCase().includes(key.toLowerCase()));
  return found || "";
}

function normalizeImageCandidates(value){
  if (Array.isArray(value)) return value.filter(Boolean);
  return value ? [value] : [];
}

function getImageCandidatesForItem(item){
  const key = imageModelKey(item);
  const candidates = normalizeImageCandidates(MODEL_IMAGES[key]);
  return candidates.length ? candidates : [FALLBACK_IMAGE];
}

function getImageForItem(item){
  return getImageCandidatesForItem(item)[0] || FALLBACK_IMAGE;
}

function lineGroupFor(item){
  const category = (item.category || "").toLowerCase();
  const model = cleanModelOnly(item.title || item.raw);

  if (category === "iphone"){
    const m = model.match(/iPhone\s*(1[0-9][A-Z]?)/i);
    if (!m) return "OUTROS";
    return `LINHA ${m[1]}`;
  }
  if (category.includes("mac")) return "MACBOOKS";
  if (category.includes("watch") || category.includes("relóg")) return "APPLE WATCH";
  if (category.includes("airpods")) return "AIRPODS";
  if (category.includes("ipad")) return "IPADS";
  return "OUTROS";
}

function normalizeText(text){
  return String(text || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .trim();
}

function uniqueArray(arr){
  return [...new Set(arr.filter(Boolean))];
}

function parseList(rawText, sourceName){
  const lines = rawText.split("\n").map(normalizeLine);

  let status = DEFAULT_STATUS;
  let category = "Geral";
  const data = {};

  for (let i = 0; i < lines.length; i++){
    const line = lines[i];
    if (!line) continue;

    if (isItemStart(line)){
      let combinedLine = line;
      const extraInfo = [];

      for (let j = i + 1; j < lines.length; j++){
        const nextLine = lines[j];
        if (!nextLine) continue;
        if (isItemStart(nextLine)) break;
        if (isCategoryLine(nextLine)) break;
        if (isStatusHeader(nextLine)) break;
        if (guessCategoryFromText(nextLine) && !isItemStart(nextLine)) break;
        if (/^✅/.test(nextLine)) break;
        extraInfo.push(nextLine);
      }

      if (extraInfo.length){
        combinedLine += " • " + extraInfo.join(" • ");
      }

      const item = parseItemLine(combinedLine);

      item.source = sourceName;
      item.status = status;
      item.category = category === "Geral" ? "iPhone" : category;
      item.lineGroup = lineGroupFor(item);

      item.colorsWords = extractColorsFromWords(item.raw + " " + item.details);

      let emojiColors = [];
      const next = lines[i + 1] || "";
      if (next && extractColorsFromEmojiLine(next).length){
        emojiColors = extractColorsFromEmojiLine(next);
      }
      item.colorsEmoji = emojiColors;

      item.isUpgrade = /\bUPGRADE\b/i.test(item.raw) || /\bUPGRADE\b/i.test(item.title);
      if (item.isUpgrade){
        item.status = "UPGRADE";
      }

      data[item.status] ??= {};
      data[item.status][item.category] ??= [];
      data[item.status][item.category].push(item);
      continue;
    }

    const st = detectStatus(line);
    if (st){
      status = st;
      continue;
    }

    if (isCategoryLine(line)){
      category = parseCategory(line);
      continue;
    }

    const guessCat = guessCategoryFromText(line);
    if (guessCat && !isItemStart(line)){
      category = guessCat;
      continue;
    }

    if (line === "---" || /^[-—_]{6,}$/.test(line)) continue;
  }

  return { data };
}

function parseSenaList(rawText, sourceName){
  const lines = rawText.split("\n").map(normalizeLine).filter(Boolean);
  const blocks = [];
  let current = [];

  for (const line of lines){
    if (/^[—-]{8,}$/.test(line)){
      if (current.length){
        blocks.push(current);
        current = [];
      }
      continue;
    }
    current.push(line);
  }
  if (current.length) blocks.push(current);

  const data = { SEMINOVOS: { iPhone: [] } };

  for (const block of blocks){
    const titleLine = block.find(l => /^📱/.test(l));
    const priceLine = block.find(l => /^💰/.test(l));
    if (!titleLine || !priceLine) continue;

    const batteryLine = block.find(l => /^🔋/.test(l)) || "";
    const colorLines = block.filter(l => /^[🖤🤍💙🩶🩷💜🩵❤️🧡💛💚]/.test(l) && !/AB\s*💰/i.test(l));
    const rawColorsText = colorLines.map(l => l.replace(/^[🖤🤍💙🩶🩷💜🩵❤️🧡💛💚]\s*/, "").trim()).join(" ");

    const item = {
      source: sourceName,
      status: "SEMINOVOS",
      category: "iPhone",
      title: titleLine.replace(/^📱\s*/, "").trim(),
      raw: `${titleLine} ${batteryLine} ${rawColorsText}`.trim(),
      details: batteryLine ? batteryLine.replace(/^🔋/, "Bateria: ").trim() : "",
      price: normalizeMoneyText(priceLine),
      colorsWords: extractColorsFromWords(rawColorsText),
      colorsEmoji: colorLines.flatMap(extractColorsFromEmojiLine),
      isUpgrade: false
    };

    item.lineGroup = lineGroupFor(item);
    data.SEMINOVOS.iPhone.push(item);
  }

  return { data };
}

function parseBr10List(rawText, sourceName){
  const lines = rawText.split("\n").map(normalizeLine).filter(Boolean);
  const data = {};
  let status = DEFAULT_STATUS;
  let category = "iPhone";

  for (let i = 0; i < lines.length; i++){
    const line = lines[i];
    if (!line) continue;

    const st = detectStatus(line);
    if (st){
      status = st;
      continue;
    }

    const guessCat = guessCategoryFromText(line);
    if (guessCat && !isItemStart(line)){
      category = guessCat;
      continue;
    }

    if (!isItemStart(line)) continue;

    const item = parseItemLine(line);
    item.source = sourceName;
    item.status = status;
    item.category = category || "iPhone";
    item.colorsWords = extractColorsFromWords(`${item.title} ${item.details}`);
    item.colorsEmoji = [];
    item.isUpgrade = false;
    item.lineGroup = lineGroupFor(item);

    data[item.status] ??= {};
    data[item.status][item.category] ??= [];
    data[item.status][item.category].push(item);
  }

  return { data };
}

function flattenParsed(parsed){
  const items = [];
  for (const status of Object.keys(parsed.data || {})){
    const cats = parsed.data[status] || {};
    for (const cat of Object.keys(cats)){
      items.push(...cats[cat]);
    }
  }
  return items;
}

function enrichItem(item){
  const model = modelFilterValue(item);
  const capacity = extractCapacity(item.title || item.raw);
  const colorList = uniqueArray([
    ...(item.colorsWords || []),
    ...(item.colorsEmoji || []).map(e => EMOJI_COLOR_MAP.get(e)).filter(Boolean)
  ]);
  const priceNumber = parseBRL(item.price);
  const imagePath = getImageForItem(item);
  const imageCandidates = getImageCandidatesForItem(item);
  const imageLabel = imageModelKey(item) || "Imagem do produto";
  const searchBlob = normalizeText([
    item.source,
    item.status,
    item.category,
    item.title,
    item.raw,
    item.details,
    model,
    capacity,
    colorList.join(" "),
    colorsTextForMessage(item),
    displayTitle(item),
    imageLabel
  ].filter(Boolean).join(" "));

  return {
    ...item,
    _model: model,
    _capacity: capacity,
    _colors: colorList,
    _priceNumber: priceNumber,
    _searchBlob: searchBlob,
    _imagePath: imagePath,
    _imageCandidates: imageCandidates,
    _imageLabel: imageLabel
  };
}

function showToast(text){
  const el = document.getElementById("toast");
  el.textContent = text || "Mensagem copiada ✅";
  el.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove("show"), 1600);
}
async function copyText(text){
  try{
    await navigator.clipboard.writeText(text);
    showToast("Texto copiado ✅");
  }catch(e){
    window.prompt("Copie a mensagem:", text);
  }
}

async function copyImage(imageUrl, fallbackText = ""){
  try{
    const absoluteUrl = new URL(imageUrl, window.location.href).href;
    const response = await fetch(absoluteUrl, { mode:"cors" });
    if (!response.ok) throw new Error("Falha ao carregar imagem");
    const blob = await response.blob();
    const type = blob.type || "image/png";

    if (!navigator.clipboard || !window.ClipboardItem){
      throw new Error("Clipboard sem suporte");
    }

    await navigator.clipboard.write([
      new ClipboardItem({
        [type]: blob
      })
    ]);

    showToast("Imagem copiada ✅");
  }catch(error){
    if (fallbackText){
      await copyText(fallbackText);
      showToast("Imagem não suportada no navegador. Texto copiado ✅");
    }else{
      showToast("Seu navegador não permitiu copiar a imagem");
    }
  }
}

function installmentOnly(item, n){
  const cash = parseBRL(item.price);
  const calc = calcInstallmentFromCash(cash, n);
  if (!calc) return "";
  return formatBRL(calc.parcela);
}

function buildMessage(item){
  const model = modelForMessage(item);
  const price = item.price || "R$ (consultar)";
  const colorsTxt = colorsTextForMessage(item);

  const i6 = installmentOnly(item, 6);
  const i10 = installmentOnly(item, 10);
  const i12 = installmentOnly(item, 12);

  const genericCats = ["macbooks","apple watch","airpods","ipads","relógios"];
  if (genericCats.includes((item.category || "").toLowerCase())) {
    return TEMPLATE_GENERIC(model, price, i6, i10, i12, colorsTxt);
  }

  if (item.status === "SEMINOVOS" || item.status === "UPGRADE") {
    return TEMPLATE_SEMINOVO(model, price, i6, i10, i12, colorsTxt);
  }
  return TEMPLATE_LACRADO(model, price, i6, i10, i12, colorsTxt);
}

function escapeHtml(str){
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatUpdatedPill(){
  const d = new Date();
  const br = d.toLocaleDateString("pt-BR", { day:"2-digit", month:"2-digit", year:"numeric" });
  document.getElementById("updatedPill").textContent = `📌 Atualização: ${br}`;
}

function countItems(block){
  let c = 0;
  for (const cat in block) c += block[cat].length;
  return c;
}

function catWeight(cat){
  const u = cat.toUpperCase();
  if (u.includes("IPHONE")) return 1;
  if (u.includes("APPLE WATCH") || u.includes("RELÓG") || u.includes("RELOG")) return 2;
  if (u.includes("AIRPODS")) return 3;
  if (u.includes("IPAD")) return 4;
  if (u.includes("MAC")) return 5;
  return 9;
}

function handleImageError(img){
  const current = Number(img.dataset.imgIndex || "0");
  const candidates = (img.dataset.candidates || "")
    .split("||")
    .map(s => s.trim())
    .filter(Boolean);

  const nextIndex = current + 1;
  if (nextIndex < candidates.length){
    img.dataset.imgIndex = String(nextIndex);
    img.src = candidates[nextIndex];
    return;
  }

  img.style.display = "none";
  if (img.nextElementSibling){
    img.nextElementSibling.style.display = "flex";
  }
}

function cardHtml(it, key, cfg){
  const isUpgrade = it.status === "UPGRADE";
  const isSemi = it.status === "SEMINOVOS" || isUpgrade;
  const badgeText = isUpgrade ? "Upgrade" : (isSemi ? "Seminovo" : "Lacrado");
  const badgeClass = isSemi ? "seminovo" : "lacrado";
  const colorsTxt = colorsTextForMessage(it);

  const chips = [];
  (it.colorsWords || []).slice(0, 6).forEach(c => chips.push(`<span class="chip">${escapeHtml(c)}</span>`));
  (it.colorsEmoji || []).slice(0, 10).forEach(e => {
    const name = EMOJI_COLOR_MAP.get(e);
    chips.push(`<span class="chip">${escapeHtml(e)}${name ? " " + escapeHtml(name) : ""}</span>`);
  });

  const upgradeBadge = it.isUpgrade ? `<div class="badge upgrade">UPGRADE</div>` : "";
  const extraDetails = [it.details].filter(Boolean).join(" • ");

  const i6 = installmentOnly(it, 6);
  const i10 = installmentOnly(it, 10);
  const i12 = installmentOnly(it, 12);

  const isQuality = cfg.key === "QUALITY";
  const isIphoneCat = (it.category || "").toLowerCase() === "iphone";
  const toneClass = isQuality ? "quality" : (isIphoneCat ? `iphone ${cfg.cardTone}` : "");
  const storeClass = `store-${cfg.key.toLowerCase()}`;
  const statusClass = isSemi ? "status-seminovo" : "status-lacrado";
  const candidates = (it._imageCandidates || [it._imagePath || FALLBACK_IMAGE]).filter(Boolean);

  return `
    <article
      class="card ${toneClass} ${storeClass} ${statusClass}"
      data-card="1"
      data-source="${escapeHtml(it.source || "")}"
      data-status="${escapeHtml(it.status || "")}"
      data-category="${escapeHtml(it.category || "")}"
      data-model="${escapeHtml(it._model || "")}"
      data-capacity="${escapeHtml(it._capacity || "")}"
      data-colors="${escapeHtml((it._colors || []).join("|"))}"
      data-price="${escapeHtml(String(it._priceNumber || ""))}"
      data-search="${escapeHtml(it._searchBlob || "")}"
    >
      <div class="badge ${badgeClass}">${badgeText}</div>
      ${upgradeBadge}

      <div class="image-wrap">
        <img
          class="product-image"
          src="${escapeHtml(candidates[0] || FALLBACK_IMAGE)}"
          alt="${escapeHtml(displayTitle(it))}"
          loading="lazy"
          data-img-index="0"
          data-candidates="${escapeHtml(candidates.join('||'))}"
          onerror="handleImageError(this)"
        />
        <div class="image-fallback" style="display:none">
          <div>Sem imagem enviada ainda</div>
          <div>${escapeHtml((candidates || []).join(" | ") || FALLBACK_IMAGE)}</div>
        </div>
        <div class="image-label">${escapeHtml(it._imageLabel || "Imagem do produto")}</div>
      </div>

      <h4 class="name">${escapeHtml(displayTitle(it))}</h4>
      <p class="details">${escapeHtml(extraDetails || (colorsTxt ? `Cores: ${colorsTxt}` : ""))}</p>
      ${chips.length ? `<div class="chips">${chips.join("")}</div>` : ""}

      <div class="price-row">
        <div class="price">
          <span>${escapeHtml(it.price || "Consultar")}</span>
          ${i6 ? `<span class="installment">6x ${escapeHtml(i6)}</span>` : ""}
          ${i10 ? `<span class="installment">10x ${escapeHtml(i10)}</span>` : ""}
          ${i12 ? `<span class="installment">12x ${escapeHtml(i12)}</span>` : ""}
        </div>
        <div class="actions">
          <button class="copy" type="button" data-key="${escapeHtml(key)}">📋 Copiar texto</button>
          <button class="copy" type="button" data-image-key="${escapeHtml(key)}">🖼️ Copiar imagem</button>
        </div>
      </div>
    </article>
  `;
}

function renderBlock(container, cfg, parsed){
  const data = parsed.data;
  const statusOrder = ["LACRADOS","SEMINOVOS","UPGRADE"];
  const index = new Map();

  const html = statusOrder
    .filter(st => data[st] && Object.keys(data[st]).length)
    .map(st => {
      const block = data[st];
      const total = countItems(block);
      const cats = Object.keys(block).sort((a, b) => catWeight(a) - catWeight(b) || a.localeCompare(b, "pt-BR"));

      const catsHtml = cats.map(cat => {
        const items = block[cat];
        const lineGroups = {};

        items.forEach(it => {
          const line = it.lineGroup || "OUTROS";
          lineGroups[line] ??= [];
          lineGroups[line].push(it);
        });

        const linesHtml = Object.keys(lineGroups)
          .sort((a, b) => a.localeCompare(b, "pt-BR", { numeric:true }))
          .map(lineName => {
            const rowItems = lineGroups[lineName];
            const cards = rowItems.map((it, idx) => {
              const itemKey = `${cfg.key}-${st}-${cat}-${lineName}-${idx}-${Math.random().toString(36).slice(2,7)}`;
              index.set(itemKey, it);
              return cardHtml(it, itemKey, cfg);
            }).join("");

            return `
              <details class="line" data-line="1" open>
                <summary>
                  <h4 class="line-title">${escapeHtml(lineName)}</h4>
                  <span class="line-hint">${rowItems.length} item${rowItems.length > 1 ? "s" : ""}</span>
                </summary>
                <div class="line-block">
                  <div class="grid">${cards}</div>
                </div>
              </details>
            `;
          }).join("");

        return `
          <details class="cat" data-cat="1" open>
            <summary>
              <div class="cat-left">
                <h4 class="cat-title">${escapeHtml(cat)}</h4>
                <div class="cat-sub">${items.length} item${items.length > 1 ? "s" : ""}</div>
              </div>
              <span class="count">${items.length}</span>
            </summary>
            ${linesHtml}
          </details>
        `;
      }).join("");

      const h3Class = st === "LACRADOS" ? "h3-blue" : (st === "UPGRADE" ? "h3-upgrade" : "h3-green");
      const label = st === "LACRADOS" ? "📦 Lacrados" : (st === "UPGRADE" ? "⬆️ Upgrades" : "✨ Seminovos");

      return `
        <div class="section" data-section="1">
          <div class="section-head">
            <h3 class="${h3Class}">${label}</h3>
            <div class="count">${total} itens</div>
          </div>
          ${catsHtml}
        </div>
      `;
    }).join("");

  container.innerHTML = `
    <div class="block" data-block="1">
      <div class="block-head">
        <div class="block-left">
          <div class="store-badge ${cfg.badgeClass}">${cfg.icon} ${escapeHtml(cfg.title)}</div>
          <div class="block-sub">Toque em “Copiar texto” ou “Copiar imagem”</div>
        </div>
        <div class="block-sub block-sub-stack">
          <span>6x • 10x • 12x calculado pela máquina</span>
          <span>Parcelamos em até 18x no cartão</span>
        </div>
      </div>
      ${html || `<div class="section"><div class="foot">Nenhum item encontrado nesta lista.</div></div>`}
      <div class="foot">Valores à vista • Parcelamento: consultar</div>
    </div>
  `;

  container.querySelector(".block").addEventListener("click", async (e) => {
    const textBtn = e.target.closest("button[data-key]");
    if (textBtn){
      const key = textBtn.getAttribute("data-key");
      const item = index.get(key);
      if (item) await copyText(buildMessage(item));
      return;
    }

    const imageBtn = e.target.closest("button[data-image-key]");
    if (imageBtn){
      const key = imageBtn.getAttribute("data-image-key");
      const item = index.get(key);
      if (item) await copyImage(item._imagePath || FALLBACK_IMAGE, buildMessage(item));
    }
  });
}

function populateSelect(select, values, placeholder){
  select.innerHTML = "";
  const first = document.createElement("option");
  first.value = "";
  first.textContent = placeholder;
  select.appendChild(first);

  values.forEach(value => {
    const opt = document.createElement("option");
    opt.value = value;
    opt.textContent = value;
    select.appendChild(opt);
  });
}

function formatCountText(n){
  return `${n} item${n === 1 ? "" : "s"} encontrado${n === 1 ? "" : "s"}`;
}

function parseInputMoney(value){
  const digits = String(value || "").replace(/[^\d]/g, "");
  return digits ? Number(digits) : NaN;
}

function buildFilterOptions(items){
  const models = uniqueArray(items.map(it => it._model)).sort((a,b) => a.localeCompare(b, "pt-BR"));
  const capacities = uniqueArray(items.map(it => it._capacity)).sort((a,b) => {
    const na = parseInt((a.match(/\d+/) || [])[0] || "0", 10);
    const nb = parseInt((b.match(/\d+/) || [])[0] || "0", 10);
    return na - nb || a.localeCompare(b, "pt-BR");
  });
  const colors = uniqueArray(items.flatMap(it => it._colors || [])).sort((a,b) => a.localeCompare(b, "pt-BR"));

  populateSelect(document.getElementById("filterModel"), models, "Todos");
  populateSelect(document.getElementById("filterCapacity"), capacities, "Todos");
  populateSelect(document.getElementById("filterColor"), colors, "Todas");
}

function getCurrentFilters(){
  return {
    search: normalizeText(document.getElementById("filterSearch").value),
    model: document.getElementById("filterModel").value,
    capacity: document.getElementById("filterCapacity").value,
    color: normalizeText(document.getElementById("filterColor").value),
    status: document.getElementById("filterStatus").value,
    min: parseInputMoney(document.getElementById("filterMin").value),
    max: parseInputMoney(document.getElementById("filterMax").value)
  };
}

function cardMatchesFilters(card, filters){
  const search = card.dataset.search || "";
  const model = card.dataset.model || "";
  const capacity = card.dataset.capacity || "";
  const colors = normalizeText((card.dataset.colors || "").replaceAll("|", " "));
  const status = card.dataset.status || "";
  const price = Number(card.dataset.price || 0);

  if (filters.search && !search.includes(filters.search)) return false;
  if (filters.model && model !== filters.model) return false;
  if (filters.capacity && capacity !== filters.capacity) return false;
  if (filters.color && !colors.includes(filters.color)) return false;
  if (filters.status && status !== filters.status) return false;
  if (Number.isFinite(filters.min) && price < filters.min) return false;
  if (Number.isFinite(filters.max) && price > filters.max) return false;

  return true;
}

function applyFilters(){
  const filters = getCurrentFilters();
  const cards = [...document.querySelectorAll("[data-card='1']")];
  let visibleCards = 0;

  cards.forEach(card => {
    const visible = cardMatchesFilters(card, filters);
    card.style.display = visible ? "" : "none";
    if (visible) visibleCards += 1;
  });

  document.querySelectorAll("[data-line='1']").forEach(line => {
    const hasVisible = [...line.querySelectorAll("[data-card='1']")].some(card => card.style.display !== "none");
    line.style.display = hasVisible ? "" : "none";
  });

  document.querySelectorAll("[data-cat='1']").forEach(cat => {
    const hasVisible = [...cat.querySelectorAll("[data-card='1']")].some(card => card.style.display !== "none");
    cat.style.display = hasVisible ? "" : "none";
  });

  document.querySelectorAll("[data-section='1']").forEach(section => {
    const hasVisible = [...section.querySelectorAll("[data-card='1']")].some(card => card.style.display !== "none");
    section.style.display = hasVisible ? "" : "none";
  });

  document.querySelectorAll("[data-block='1']").forEach(block => {
    const hasVisible = [...block.querySelectorAll("[data-card='1']")].some(card => card.style.display !== "none");
    block.style.display = hasVisible ? "" : "none";
  });

  document.getElementById("resultsPill").textContent = visibleCards ? formatCountText(visibleCards) : "Nenhum item encontrado";
  document.getElementById("emptyState").classList.toggle("show", visibleCards === 0);
}

function bindFilters(items){
  buildFilterOptions(items);

  const ids = ["filterSearch","filterModel","filterCapacity","filterColor","filterStatus","filterMin","filterMax"];
  ids.forEach(id => {
    const el = document.getElementById(id);
    const evt = el.tagName === "SELECT" ? "change" : "input";
    el.addEventListener(evt, applyFilters, { passive:true });
  });

  document.getElementById("clearFiltersBtn").addEventListener("click", () => {
    document.getElementById("filterSearch").value = "";
    document.getElementById("filterModel").value = "";
    document.getElementById("filterCapacity").value = "";
    document.getElementById("filterColor").value = "";
    document.getElementById("filterStatus").value = "";
    document.getElementById("filterMin").value = "";
    document.getElementById("filterMax").value = "";
    applyFilters();
  }, { passive:true });
}

function render(){
  formatUpdatedPill();

  const app = document.getElementById("app");
  app.innerHTML = "";

  const parsedUpgrades = parseList(RAW_UPGRADES, "UPGRADES");
  const parsedManga = parseList(RAW_MANGA, "MANGA");
  const parsedTech = parseList(RAW_TECH, "ImportTech");
  const parsedQuality = parseList(RAW_QUALITY, "QUALITY PREMIUM");
  const parsedSena = parseSenaList(RAW_SENA, "SENA");
  const parsedBr10 = parseBr10List(RAW_BR10, "ATACADO BR10");

  [parsedUpgrades, parsedManga, parsedTech, parsedQuality, parsedSena, parsedBr10].forEach(parsed => {
    for (const status of Object.keys(parsed.data || {})){
      for (const cat of Object.keys(parsed.data[status] || {})){
        parsed.data[status][cat] = parsed.data[status][cat].map(enrichItem);
      }
    }
  });

  const allItems = [
    ...flattenParsed(parsedUpgrades),
    ...flattenParsed(parsedManga),
    ...flattenParsed(parsedTech),
    ...flattenParsed(parsedQuality),
    ...flattenParsed(parsedSena),
    ...flattenParsed(parsedBr10)
  ];

  const upgradesWrap = document.createElement("div");
  const mangaWrap = document.createElement("div");
  const techWrap = document.createElement("div");
  const qualityWrap = document.createElement("div");
  const senaWrap = document.createElement("div");
  const br10Wrap = document.createElement("div");

  renderBlock(upgradesWrap, {
    key:"UPGRADE",
    title:"UPGRADES",
    badgeClass:"upgrade",
    icon:"⬆️",
    cardTone:"upgrade"
  }, parsedUpgrades);

  renderBlock(mangaWrap, {
    key:"MANGA",
    title:"Aparelhos MANGA",
    badgeClass:"manga",
    icon:"🥭",
    cardTone:"manga"
  }, parsedManga);

  renderBlock(techWrap, {
    key:"TECH",
    title:"Aparelhos ImportTech",
    badgeClass:"tech",
    icon:"⚡",
    cardTone:"tech"
  }, parsedTech);

  renderBlock(qualityWrap, {
    key:"QUALITY",
    title:"Aparelhos QUALITY PREMIUM",
    badgeClass:"quality",
    icon:"🏆",
    cardTone:"quality"
  }, parsedQuality);

  renderBlock(senaWrap, {
    key:"SENA",
    title:"Aparelhos Sena",
    badgeClass:"sena",
    icon:"🔥",
    cardTone:"sena"
  }, parsedSena);

  renderBlock(br10Wrap, {
    key:"BR10",
    title:"Aparelhos ATACADO BR10",
    badgeClass:"br10",
    icon:"🚨",
    cardTone:"br10"
  }, parsedBr10);

  app.appendChild(upgradesWrap);
  app.appendChild(mangaWrap);
  app.appendChild(techWrap);
  app.appendChild(qualityWrap);
  app.appendChild(senaWrap);
  app.appendChild(br10Wrap);

  bindFilters(allItems);
  applyFilters();
}

let allOpen = false;
function setAllDetails(open){
  document.querySelectorAll("details.cat, details.line").forEach(d => {
    d.open = !!open;
  });
  allOpen = !!open;
  const btn = document.getElementById("toggleAllBtn");
  btn.textContent = allOpen ? "🔼 Fechar todas" : "🔽 Abrir todas";
}

document.getElementById("toggleAllBtn").addEventListener("click", () => {
  setAllDetails(!allOpen);
}, { passive:true });

render();
</script>
